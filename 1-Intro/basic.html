<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basics</title>
    <style>
     .btn{
        border: none;border-radius: 24px;background:linear-gradient(45deg,black,red);color: white;
        font-size: 2rem; padding: 10px 20px; margin: 25px;
     }
     .clr2{
        background:linear-gradient(45deg,black,rgb(183, 79, 214));
     }
    </style>
</head>
<body>
    <button class = "btn" title="button" onclick="alert(`This is a button`)">Alert!!!</button>
    <button class = "btn clr2" title="button" 
    onclick="document.body.innerHTML=`<h1>This is written By JS it override everthing in UI</h1>`">Override</button>
    <h2>Check the js code of basic in console F12</h2>
    <script src="basic.js">
    </script>
</body>
</html>
